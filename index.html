<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Question Bank Viewer</title>
<style>
  :root {
    --bg: #131a26;
    --card: #2a3548;
    --card-bg: #1a2233;
    --card-border: #2e3a50;
    --green: #1f9d55;
    --green-dark: #1d4631;
    --blue-border: #2563eb;
    --blue-bg: #1d2e4f;
    --text: #e6e9ef;
    --text-dim: #9aa4b5;
    --red: #e23b3b;
    --orange: #f0a83a;
    --teal: #2ecc71;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    margin: 0;
    padding: 24px;
  }

  /* Search bar */
  .search-wrap {
    max-width: 1000px;
    margin: 0 auto 28px auto;
  }
  #search-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text);
    font-size: 16px;
    padding: 12px 16px;
    border-radius: 8px;
    outline: none;
  }
  #search-input:focus { border-color: var(--blue-border); }
  #search-meta { color: var(--text-dim); font-size: 13px; margin-top: 8px; }

  /* Question card */
  .question-card {
    max-width: 1000px;
    margin: 0 auto 28px auto;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 24px;
  }
  .qid { color: var(--text-dim); font-size: 14px; margin-bottom: 6px; }
  .qtext { font-size: 24px; margin-bottom: 16px; line-height: 1.35; }
  .option {
    background: var(--card);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 10px;
    font-size: 17px;
  }
  .option.correct {
    background: var(--green);
    font-weight: bold;
  }
  .answer-banner {
    background: var(--green-dark);
    border-radius: 8px;
    padding: 14px 18px;
    margin: 14px 0 18px 0;
    color: #6fe39a;
    font-size: 16px;
  }
  .answer-banner b { color: #b6f5cf; }

  /* Image now sits below the answer banner, capped so it never dominates the card */
  .q-image-wrap { margin-bottom: 18px; text-align: center; }
  .q-image {
    max-width: 320px;
    max-height: 320px;
    width: auto;
    height: auto;
    border-radius: 8px;
    display: inline-block;
    border: 1px solid var(--card-border);
  }

  .dimension { color: var(--text-dim); margin-bottom: 10px; font-size: 15px; }
  .concept {
    background: var(--blue-bg);
    border: 1px solid var(--blue-border);
    border-radius: 8px;
    padding: 12px 18px;
    margin-bottom: 14px;
    font-size: 14px;
    color: #8fb4f0;
    letter-spacing: 0.5px;
  }
  .concept b { color: #fff; letter-spacing: normal; }
  .difficulty-box {
    background: #0f1622;
    border-radius: 10px;
    padding: 18px;
  }
  .difficulty-title {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    margin-bottom: 14px;
  }
  .grade-grid {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .grade-cell {
    background: var(--blue-bg);
    border-radius: 8px;
    padding: 10px 14px;
    min-width: 80px;
    text-align: center;
  }
  .grade-cell .gname { color: #8fb4f0; font-size: 14px; margin-bottom: 8px; }
  .bar-track { background: #1c2738; border-radius: 3px; height: 4px; margin-bottom: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .grade-cell .pct { font-weight: bold; font-size: 14px; }
  #status { text-align: center; color: var(--text-dim); padding: 40px; }
</style>
</head>
<body>

<div class="search-wrap">
  <input id="search-input" type="text" placeholder="Search by question ID...">
  <div id="search-meta"></div>
</div>

<div id="status">Loading questions...</div>
<div id="quiz-container"></div>

<script>
let allQuestions = [];

function difficultyColor(pct) {
  if (pct >= 60) return "var(--red)";
  if (pct >= 25) return "var(--orange)";
  return "var(--teal)";
}

// Generates A, B, C ... Z, AA, AB ... so any number of options is supported
function letterFor(i) {
  let s = "";
  i += 1;
  while (i > 0) {
    const rem = (i - 1) % 26;
    s = String.fromCharCode(65 + rem) + s;
    i = Math.floor((i - 1) / 26);
  }
  return s;
}

function renderQuestion(q, displayIndex) {
  const card = document.createElement("div");
  card.className = "question-card";

  // options is an array of strings; correct is a numeric index into it
  const optionsHtml = q.options.map((val, i) => {
    const isCorrect = i === q.correct;
    return `<div class="option ${isCorrect ? "correct" : ""}">${letterFor(i)}. ${val}</div>`;
  }).join("");

  const correctLetter = letterFor(q.correct);
  const correctText = q.options[q.correct];

  const imageHtml = q.image
    ? `<div class="q-image-wrap"><img class="q-image" src="images/${q.image}" alt="question image"></div>`
    : "";

  // difficulty keys are plain grade numbers ("6".."12") with decimal values (0.95 = 95%)
  const gradeKeys = Object.keys(q.difficulty || {}).sort((a, b) => Number(a) - Number(b));
  const gradesHtml = gradeKeys.map(g => {
    const pct = Math.round(q.difficulty[g] * 100);
    return `
      <div class="grade-cell">
        <div class="gname">Gr ${g}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%; background:${difficultyColor(pct)}"></div>
        </div>
        <div class="pct">${pct}%</div>
      </div>`;
  }).join("");

  card.innerHTML = `
    <div class="qid">ID: ${q.id}${q.mandatory ? " &nbsp;•&nbsp; <span style='color:#f0a83a'>Mandatory</span>" : ""}</div>
    <div class="qtext">${displayIndex + 1}. ${q.text.replace(/\n/g, "<br>")}</div>
    ${optionsHtml}
    <div class="answer-banner">✅ Answer: <b>${correctLetter}. ${correctText}</b></div>
    ${imageHtml}
    <div class="dimension">Dimension: ${q.dimension}</div>
    <div class="concept">📘 CONCEPT TAUGHT: <b>${q["concept-taught"]}</b></div>
    <div class="difficulty-box">
      <div class="difficulty-title">⚠ DIFFICULTY</div>
      <div class="grade-grid">${gradesHtml}</div>
    </div>
  `;
  return card;
}

function renderList(questions) {
  const container = document.getElementById("quiz-container");
  container.innerHTML = "";
  questions.forEach((q, i) => container.appendChild(renderQuestion(q, i)));
}

function applySearch() {
  const raw = document.getElementById("search-input").value.trim();
  const meta = document.getElementById("search-meta");

  if (raw === "") {
    meta.textContent = `Showing all ${allQuestions.length} questions`;
    renderList(allQuestions);
    return;
  }

  // Exact ID match if numeric, otherwise treat as partial ID match
  const asNumber = Number(raw);
  let results;
  if (!isNaN(asNumber)) {
    results = allQuestions.filter(q => q.id === asNumber);
    if (results.length === 0) {
      // fallback to partial match on string form of id
      results = allQuestions.filter(q => String(q.id).includes(raw));
    }
  } else {
    results = allQuestions.filter(q => String(q.id).includes(raw));
  }

  meta.textContent = results.length
    ? `Found ${results.length} question(s) matching ID "${raw}"`
    : `No question found with ID "${raw}"`;
  renderList(results);
}

async function loadQuestions() {
  const statusEl = document.getElementById("status");
  try {
    const res = await fetch("red.json");
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    allQuestions = data.questions; // top-level JSON is {"questions": [...]}
    statusEl.style.display = "none";
    document.getElementById("search-meta").textContent = `Showing all ${allQuestions.length} questions`;
    renderList(allQuestions);
  } catch (err) {
    statusEl.textContent = "Failed to load red.json: " + err.message;
  }
}

document.getElementById("search-input").addEventListener("input", applySearch);

loadQuestions();
</script>

</body>
</html>
